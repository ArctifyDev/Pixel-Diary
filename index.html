<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pixel Diary</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="bg-color"></div>

  <div class="login-form">
    <div class="top-part">
      <p class="login-page-title">
        PIXEL DIARY
      </p>
    </div>
    <div class="middle-part">
      <div class="acc-name-bar">
        <p class="acc-name-text">
          Account Name
        </p>
        <input type="text" class="acc-name-input">
      </div>
      <div class="acc-pass-bar">
        <p class="acc-pass-text">
          Password
        </p>
        <input type="password" class="acc-pass-input">
      </div>
    </div>
    <div class="bottom-part">
      <button class="login-button">
        Login
      </button>
    </div>
  </div>


</body>
</html>
