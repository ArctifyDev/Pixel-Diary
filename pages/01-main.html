<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="01-main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- HEADER -->
  <div class="header">
    <div class="left-section">
      <img src="/assets/pixel-diary.svg" class="pixel-logo">
      <p class="pixel-logo-text">
        Pixel Diary
      </p>
    </div>
    <div class="middle-section">
      <!-- A-ICON + TEXT START -->
    <div class="icon-hover-div">
      <img class="nav-icon" src="/assets/icon-home.svg" />
      <p class="icon-hover-text">
        Home
      </p>
    </div>
      <!-- A-ICON + TEXT END -->
      <div class="search-div">
        <input type="text" placeholder="Search Item" class="search-bar">
        <button class="search-bar-icon-button">
          <img src="/assets/icon-search.svg" class="search-bar-icon">
        </button>
      </div>
    </div>
    <div class="right-section">
      <!-- A-ICON + TEXT START -->
    <div class="icon-hover-div">
      <img class="nav-icon" src="/assets/profile.png" />
      <p class="icon-hover-text">
        Configure Profile
      </p>
    </div>
      <!-- A-ICON + TEXT END -->
      <p class="profile-name">
        Arctify
      </p>
      <!-- A-ICON + TEXT START -->
    <div class="icon-hover-div">
      <img class="nav-icon" src="/assets/icon-settings.svg" />
      <p class="icon-hover-text">
        Settings
      </p>
    </div>
      <!-- A-ICON + TEXT END -->
      <!-- A-ICON + TEXT START -->
    <div class="icon-hover-div">
      <img class="nav-icon" src="/assets/icon-logout.svg" />
      <p class="icon-hover-text">
        Logout
      </p>
    </div>
      <!-- A-ICON + TEXT END -->
      
    </div>
  </div>

  <!-- SIDEBAR -->
    <div class="sidebar">
      <!-- A-ICON + TEXT V2 START -->
    <div class="icon-hover-div-v2">
      <img class="nav-icon-v2" src="/assets/icon-plus.svg" />
      <p class="icon-hover-text-v2">
        ADD NEW ENTRY
      </p>
    </div>
      <!-- A-ICON + TEXT V2 END -->
      <!-- PROFILE INFORMATION -->
    <div class="profile-info-div">
      <img src="/assets/profile.png" class="profile-icon">
      <p class="profile-name">
        Arctify
      </p>
      <p class="profile-rank">
        Administrator
      </p>
      <!-- END OF PROFILE INFORMATION -->
      <!-- PROGRESS BAR INFORMATION V1 -->
      <div class="progress-bar-div-v1">
        <div class="progress-bar-fill-v1"></div>
        <span class="progress-bar-text-v1">80%</span>
        <span class="progress-bar-type-v1">Daily Progress</span>
      </div>
      <!-- PROGRESS BAR INFORMATION END V1 -->
      <!-- PROGRESS BAR INFORMATION V2 -->
      <div class="progress-bar-div-v2">
        <div class="progress-bar-fill-v2"></div>
        <span class="progress-bar-text-v2">30%</span>
        <span class="progress-bar-type-v2">Weekly Progress</span>
      </div>
      <!-- PROGRESS BAR INFORMATION END V2 -->
      <!-- PROGRESS BAR INFORMATION V3 -->
      <div class="progress-bar-div-v3">
        <div class="progress-bar-fill-v3"></div>
        <span class="progress-bar-text-v3">10%</span>
        <span class="progress-bar-type-v3">Monthly Progress</span>
      </div>
      <!-- PROGRESS BAR INFORMATION END V3 -->
      
      


    </div>   
    </div>
</body>
</html>
